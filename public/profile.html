<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール</title>
    <meta name="description" content="プロフィール情報の確認・変更">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        .scale-in {
            animation: scaleIn 0.4s ease forwards;
        }

        .avatar-ring {
            background: conic-gradient(from 0deg, #3b82f6, #8b5cf6, #ec4899, #f43f5e, #3b82f6);
            padding: 3px;
            border-radius: 50%;
        }

        .avatar-ring-dark {
            background: conic-gradient(from 0deg, #6366f1, #a855f7, #ec4899, #f43f5e, #6366f1);
        }

        .field-group {
            position: relative;
            transition: all 0.2s ease;
        }

        .field-group:focus-within {
            transform: translateY(-1px);
        }

        .field-group:focus-within .field-label {
            color: #3b82f6;
        }

        .save-btn {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
            transform: translateY(-1px);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .save-btn-dark {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .save-btn-dark:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
        }

        .logout-btn {
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            transform: translateY(-1px);
        }

        .toast {
            animation: fadeIn 0.3s ease forwards;
        }

        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }

        .skeleton-dark {
            background: linear-gradient(90deg, #374151 25%, #4b5563 50%, #374151 75%);
            background-size: 200% 100%;
        }

        .role-badge {
            font-size: 0.65rem;
            letter-spacing: 0.05em;
        }

        .info-row {
            transition: background-color 0.15s ease;
        }

        .info-row:hover {
            background-color: rgba(59, 130, 246, 0.04);
        }

        .info-row-dark:hover {
            background-color: rgba(99, 102, 241, 0.08);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300" id="body">

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 right-4 z-50 hidden">
        <div id="toastContent" class="px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 toast">
        </div>
    </div>

    <!-- Loading State -->
    <div id="loadingCard" class="w-full max-w-md p-8 rounded-2xl shadow-xl fade-in">
        <div class="text-center mb-6">
            <div class="w-20 h-20 mx-auto rounded-full skeleton mb-4"></div>
            <div class="w-32 h-5 mx-auto skeleton mb-2"></div>
            <div class="w-20 h-4 mx-auto skeleton"></div>
        </div>
        <div class="space-y-4">
            <div class="w-full h-12 skeleton"></div>
            <div class="w-full h-12 skeleton"></div>
            <div class="w-full h-12 skeleton"></div>
        </div>
    </div>

    <!-- Profile Card -->
    <div id="profileCard"
        class="w-full max-w-md p-8 rounded-2xl shadow-xl transition-all duration-300 transform hidden">

        <!-- Avatar & Name Header -->
        <div class="text-center mb-8 scale-in">
            <div class="avatar-ring w-24 h-24 mx-auto mb-4" id="avatarRing">
                <img id="avatarImg" src="" alt="アバター" class="w-full h-full rounded-full object-cover bg-gray-200"
                    onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='flex';">
                <div id="avatarFallback"
                    class="w-full h-full rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold text-2xl hidden">
                </div>
            </div>
            <h1 id="headerName" class="text-xl font-bold mb-1 transition-colors duration-300"></h1>
            <span id="roleBadge"
                class="role-badge inline-block px-3 py-0.5 rounded-full font-bold uppercase tracking-wider"></span>
        </div>

        <!-- Profile Form -->
        <div class="space-y-5 mb-6">
            <!-- Display Name -->
            <div class="field-group">
                <label
                    class="field-label block text-xs font-semibold mb-1.5 uppercase tracking-wider opacity-60 transition-colors">
                    表示名
                </label>
                <input type="text" id="displayNameInput"
                    class="w-full px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 outline-none"
                    placeholder="表示名を入力" maxlength="50">
                <p class="text-xs mt-1 opacity-40">他のユーザーに表示される名前です（50文字以内）</p>
            </div>

            <!-- Email (Read Only) -->
            <div class="field-group">
                <label class="field-label block text-xs font-semibold mb-1.5 uppercase tracking-wider opacity-60">
                    メールアドレス
                </label>
                <div id="emailDisplay" class="w-full px-4 py-3 rounded-xl text-sm opacity-60 flex items-center gap-2">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                    <span id="emailText">-</span>
                </div>
            </div>

            <!-- Account Info -->
            <div class="field-group">
                <label class="field-label block text-xs font-semibold mb-1.5 uppercase tracking-wider opacity-60">
                    アカウント情報
                </label>
                <div id="accountInfo" class="rounded-xl overflow-hidden text-sm">
                    <div class="info-row flex justify-between items-center px-4 py-2.5" id="infoRow1">
                        <span class="opacity-60">ステータス</span>
                        <span id="statusBadge" class="text-xs font-semibold px-2 py-0.5 rounded-full"></span>
                    </div>
                    <div class="info-row flex justify-between items-center px-4 py-2.5" id="infoRow2">
                        <span class="opacity-60">登録日</span>
                        <span id="createdAt" class="font-medium text-xs">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Save Button -->
        <button id="saveBtn" onclick="saveProfile()"
            class="save-btn w-full py-3.5 rounded-xl text-white font-bold text-sm disabled:opacity-50">
            変更を保存
        </button>

        <!-- Divider -->
        <div class="my-6 border-t opacity-10"></div>

        <!-- Bottom Actions -->
        <div class="flex items-center justify-between">
            <a id="backLink" href="/komarabo/index.html"
                class="text-xs opacity-50 hover:opacity-100 transition flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                戻る
            </a>
            <button onclick="doLogout()"
                class="logout-btn text-xs text-red-500 hover:text-red-600 font-medium flex items-center gap-1 transition">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                ログアウト
            </button>
        </div>
    </div>

    <script type="module">
        import { fetchAuthUser, apiRequest, escapeHtml, formatDate } from './js/common.js';

        let theme = 'komarabo';
        let currentUser = null;
        let originalName = '';

        // ========================================
        // Theme
        // ========================================

        const themes = {
            komarabo: {
                body: ['bg-cream', 'text-slate-800'],
                card: ['bg-white', 'border', 'border-slate-100', 'shadow-slate-200'],
                loading: ['bg-white', 'border', 'border-slate-100'],
                input: ['bg-gray-50', 'border', 'border-gray-200', 'focus:border-blue-400', 'focus:ring-2', 'focus:ring-blue-100', 'text-slate-800'],
                readonlyBg: ['bg-gray-50', 'border', 'border-gray-200'],
                infoBg: ['bg-gray-50', 'border', 'border-gray-200'],
                roleBadgeAdmin: ['bg-red-100', 'text-red-600'],
                roleBadgeUser: ['bg-blue-100', 'text-blue-600'],
                statusBadge: ['bg-green-100', 'text-green-600'],
                backUrl: '/komarabo/index.html',
                saveBtnClass: 'save-btn',
                isDark: false,
            },
            wakuwaku: {
                body: ['bg-slate-900', 'text-slate-100'],
                card: ['bg-slate-800', 'border', 'border-slate-700', 'shadow-slate-900'],
                loading: ['bg-slate-800', 'border', 'border-slate-700'],
                input: ['bg-slate-700', 'border', 'border-slate-600', 'focus:border-indigo-400', 'focus:ring-2', 'focus:ring-indigo-900', 'text-slate-100'],
                readonlyBg: ['bg-slate-700/50', 'border', 'border-slate-600'],
                infoBg: ['bg-slate-700/50', 'border', 'border-slate-600'],
                roleBadgeAdmin: ['bg-red-900/40', 'text-red-400'],
                roleBadgeUser: ['bg-indigo-900/40', 'text-indigo-400'],
                statusBadge: ['bg-green-900/40', 'text-green-400'],
                backUrl: '/wakuwaku/index.html',
                saveBtnClass: 'save-btn save-btn-dark',
                isDark: true,
            }
        };

        function getHash() {
            return window.location.hash.substring(1) || 'komarabo';
        }

        function applyTheme() {
            const hash = getHash();
            theme = hash === 'wakuwaku' ? 'wakuwaku' : 'komarabo';
            const t = themes[theme];
            const body = document.getElementById('body');
            const loading = document.getElementById('loadingCard');
            const card = document.getElementById('profileCard');

            body.className = 'min-h-screen flex items-center justify-center p-4 transition-colors duration-300';
            body.classList.add(...t.body);

            loading.className = 'w-full max-w-md p-8 rounded-2xl shadow-xl fade-in';
            loading.classList.add(...t.loading);

            card.className = 'w-full max-w-md p-8 rounded-2xl shadow-xl transition-all duration-300 transform hidden';
            card.classList.add(...t.card);

            // Input
            const input = document.getElementById('displayNameInput');
            input.className = 'w-full px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 outline-none';
            input.classList.add(...t.input);

            // Read-only fields
            document.getElementById('emailDisplay').className = 'w-full px-4 py-3 rounded-xl text-sm opacity-60 flex items-center gap-2';
            document.getElementById('emailDisplay').classList.add(...t.readonlyBg);

            document.getElementById('accountInfo').className = 'rounded-xl overflow-hidden text-sm';
            document.getElementById('accountInfo').classList.add(...t.infoBg);

            // Info row hover
            const rows = document.querySelectorAll('.info-row');
            rows.forEach(r => {
                r.classList.toggle('info-row-dark', t.isDark);
            });

            // Avatar ring
            document.getElementById('avatarRing').classList.toggle('avatar-ring-dark', t.isDark);

            // Save button
            document.getElementById('saveBtn').className = `${t.saveBtnClass} w-full py-3.5 rounded-xl text-white font-bold text-sm`;

            // Loading skeletons
            document.querySelectorAll('.skeleton').forEach(el => {
                el.classList.toggle('skeleton-dark', t.isDark);
            });

            // Back link
            document.getElementById('backLink').href = t.backUrl;

            // Role badge
            if (currentUser) applyRoleBadge(t);
        }

        function applyRoleBadge(t) {
            const badge = document.getElementById('roleBadge');
            badge.className = 'role-badge inline-block px-3 py-0.5 rounded-full font-bold uppercase tracking-wider';
            if (currentUser.role === 'admin') {
                badge.classList.add(...t.roleBadgeAdmin);
                badge.textContent = 'Admin';
            } else {
                badge.classList.add(...t.roleBadgeUser);
                badge.textContent = 'Member';
            }

            const statusBadge = document.getElementById('statusBadge');
            statusBadge.className = 'text-xs font-semibold px-2 py-0.5 rounded-full';
            statusBadge.classList.add(...t.statusBadge);
            statusBadge.textContent = '有効';
        }

        // ========================================
        // Load Profile
        // ========================================

        async function loadProfile() {
            const user = await fetchAuthUser();
            if (!user) {
                location.href = `/login.html#${theme}`;
                return;
            }

            currentUser = user;

            // Get full profile info from /me (includes email, created_at)
            try {
                const res = await fetch('/api/auth/me', { credentials: 'same-origin' });
                const data = await res.json();
                if (data.authenticated && data.user) {
                    currentUser = { ...currentUser, ...data.user };
                }
            } catch (e) { }

            originalName = currentUser.display_name || '';

            // Populate UI
            document.getElementById('headerName').textContent = currentUser.display_name || '未設定';
            document.getElementById('displayNameInput').value = currentUser.display_name || '';

            // Avatar
            if (currentUser.avatar_url) {
                document.getElementById('avatarImg').src = currentUser.avatar_url;
                document.getElementById('avatarImg').style.display = 'block';
                document.getElementById('avatarFallback').style.display = 'none';
            } else {
                document.getElementById('avatarImg').style.display = 'none';
                document.getElementById('avatarFallback').style.display = 'flex';
                const initials = (currentUser.display_name || '?').substring(0, 2).toUpperCase();
                document.getElementById('avatarFallback').textContent = initials;
            }

            // Email (might not be available from /me)
            document.getElementById('emailText').textContent = currentUser.email || 'Googleアカウント連携済み';

            // Status
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.textContent = '有効';

            // Created at
            if (currentUser.created_at) {
                document.getElementById('createdAt').textContent = formatDate(currentUser.created_at);
            }

            // Apply theme with user data
            applyTheme();

            // Show card, hide loading
            document.getElementById('loadingCard').classList.add('hidden');
            document.getElementById('profileCard').classList.remove('hidden');
            document.getElementById('profileCard').classList.add('fade-in');
        }

        // ========================================
        // Save Profile
        // ========================================

        window.saveProfile = async function () {
            const nameInput = document.getElementById('displayNameInput');
            const name = nameInput.value.trim();

            if (!name) {
                showToast('表示名を入力してください', 'error');
                nameInput.focus();
                return;
            }

            if (name.length > 50) {
                showToast('表示名は50文字以内にしてください', 'error');
                return;
            }

            if (name === originalName) {
                showToast('変更がありません', 'info');
                return;
            }

            const btn = document.getElementById('saveBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '保存中...';

            try {
                const data = await apiRequest('/api/auth/profile', {
                    method: 'POST',
                    body: JSON.stringify({ display_name: name }),
                });

                if (data.success) {
                    originalName = name;
                    document.getElementById('headerName').textContent = name;
                    showToast('プロフィールを更新しました ✓', 'success');
                } else {
                    showToast(data.message || '更新に失敗しました', 'error');
                }
            } catch (err) {
                showToast('通信エラーが発生しました', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        };

        // ========================================
        // Logout
        // ========================================

        window.doLogout = async function () {
            try {
                await apiRequest('/api/auth/logout', { method: 'POST' });
            } catch (e) { }
            location.href = `/login.html#${theme}`;
        };

        // ========================================
        // Toast
        // ========================================

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const content = document.getElementById('toastContent');

            const colors = {
                success: 'bg-green-50 text-green-700 border border-green-200',
                error: 'bg-red-50 text-red-700 border border-red-200',
                info: 'bg-blue-50 text-blue-700 border border-blue-200',
            };

            const darkColors = {
                success: 'bg-green-900/40 text-green-300 border border-green-800',
                error: 'bg-red-900/40 text-red-300 border border-red-800',
                info: 'bg-indigo-900/40 text-indigo-300 border border-indigo-800',
            };

            const icons = {
                success: '✓',
                error: '✕',
                info: 'ℹ',
            };

            const isDark = theme === 'wakuwaku';
            const colorSet = isDark ? darkColors : colors;

            content.className = `px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 toast ${colorSet[type]}`;
            content.innerHTML = `<span>${icons[type]}</span><span>${escapeHtml(message)}</span>`;

            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // ========================================
        // Init
        // ========================================

        window.addEventListener('hashchange', applyTheme);
        applyTheme();
        loadProfile();
    </script>
</body>

</html>
