<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワクワク試作室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }

        .section-card {
            transition: all 0.3s ease;
        }

        .section-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
        }

        /* Scanlines for retro feel */
        .scanlines {
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.1) 50%, rgba(0, 0, 0, 0.1));
            background-size: 100% 4px;
            pointer-events: none;
        }
    </style>
</head>

<body class="bg-slate-950 min-h-screen text-slate-100">
    <!-- Header -->
    <header class="border-b border-slate-800 px-6 py-4 mb-8 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- Logo Area -->
            <a href="/index.html" class="flex items-center gap-2 group">
                <div
                    class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center text-white font-black text-sm group-hover:rotate-12 transition-transform shadow-lg shadow-purple-900/50">
                    W
                </div>
                <span class="font-outfit font-bold tracking-tight text-xl text-white">ワクワク試作室</span>
            </a>

            <!-- Mode Switcher (Tabs) -->
            <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                <button id="btn-personal" onclick="switchTab('personal')"
                    class="px-4 py-2 rounded-lg text-sm font-bold transition">個人ラボ (My Lab)</button>
                <button id="btn-gallery" onclick="switchTab('gallery')"
                    class="px-4 py-2 rounded-lg text-sm font-bold transition">みんなの広場 (Gallery)</button>
            </div>

            <div class="flex items-center gap-3">
                <!-- ログイン状態表示 -->
                <span id="loginStatus" class="text-sm text-slate-400"></span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">

        <!-- Tab 1: Personal Lab (Ideation & Development) -->
        <div id="view-personal" class="space-y-20">
            <!-- ①【課題生成セクション：Ideation】 -->
            <section id="section-ideation" class="relative">
                <div class="absolute -top-10 -left-10 w-64 h-64 bg-purple-600/20 rounded-full blur-3xl -z-10"></div>

                <div class="flex items-baseline gap-4 mb-6 border-b border-slate-800 pb-2">
                    <h2
                        class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400">
                        01. Ideation
                    </h2>
                    <p class="text-sm text-slate-400">外部知能との対話の種を生成する</p>
                </div>

                <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-8 backdrop-blur-sm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
                        <!-- Config -->
                        <div class="space-y-6">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">
                                    興味・関心 / 執着
                                </label>
                                <input type="text" id="input-interest" placeholder="最近気になっていること、解決したい悩み..."
                                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-purple-500 outline-none transition placeholder-slate-600">
                            </div>

                            <div class="p-4 bg-slate-950/50 rounded-xl border border-dashed border-slate-700">
                                <div class="flex justify-between items-center mb-2">
                                    <span
                                        class="text-xs font-bold text-slate-400 uppercase tracking-widest">制約スロット</span>
                                    <span id="constraint-category"
                                        class="text-[10px] px-2 py-0.5 bg-slate-800 rounded text-slate-400">準備完了</span>
                                </div>
                                <p id="constraint-content" class="text-lg font-mono text-purple-300 min-h-[1.75rem]">???
                                </p>
                            </div>

                            <button onclick="generateSeed()"
                                class="w-full py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-xl transition shadow-lg shadow-purple-900/50 flex justify-center items-center gap-2">
                                <span class="text-xl">🎰</span> <span class="tracking-wider">テーマを生成</span>
                            </button>
                        </div>

                        <!-- Result -->
                        <div class="h-full flex flex-col">
                            <label
                                class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">生成されたプロンプトシード</label>
                            <div class="flex-1 bg-black/30 rounded-xl p-4 border border-slate-700 relative group">
                                <textarea id="output-seed" readonly
                                    class="w-full h-32 bg-transparent text-slate-300 resize-none outline-none font-mono text-sm leading-relaxed"
                                    placeholder="生成ボタンを押してください..."></textarea>

                                <div
                                    class="absolute bottom-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onclick="copySeed()"
                                        class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 text-white text-xs rounded-lg transition">
                                        プロンプトをコピー
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Create Project Button Area (Between sections) -->
            <div id="action-create-project"
                class="flex flex-col items-center justify-center py-4 opacity-50 pointer-events-none transition-opacity duration-300">
                <div class="h-10 w-0.5 bg-gradient-to-b from-purple-500/50 to-blue-500/50 mb-4"></div>
                <p class="text-xs text-slate-500 mb-3 text-center">
                    このシードで開発フェーズへ進む
                </p>
                <button onclick="createProjectFromSeed()"
                    class="px-12 py-4 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-bold rounded-full transition shadow-lg shadow-blue-900/50 flex items-center gap-3 transform hover:scale-105">
                    <span class="text-xl">🚀</span> このテーマでプロジェクトを開始する <span class="text-xl">↓</span>
                </button>
                <div class="h-10 w-0.5 bg-gradient-to-b from-blue-500/50 to-blue-500/0 mt-4"></div>
            </div>

            <!-- ②【制作・管理セクション：Development】 -->
            <section id="section-development" class="relative">
                <div class="absolute -top-10 -right-10 w-64 h-64 bg-blue-600/20 rounded-full blur-3xl -z-10"></div>

                <div class="flex items-baseline gap-4 mb-6 border-b border-slate-800 pb-2">
                    <h2
                        class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">
                        02. Development
                    </h2>
                    <p class="text-sm text-slate-400">形にする。魂を込める。</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Task List -->
                    <div class="lg:col-span-1 space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold text-slate-300">マイプロジェクト</h3>
                            <a href="#section-ideation" onclick="document.getElementById('input-interest').focus()"
                                class="text-xs bg-slate-800 text-slate-400 px-3 py-1.5 rounded hover:bg-slate-700 transition flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 4v16m8-8H4">
                                    </path>
                                </svg>
                                新規作成 (Ideationへ)
                            </a>
                        </div>
                        <div id="draft-list" class="space-y-3 min-h-[200px]">
                            <!-- Draft Items -->
                            <div class="text-center py-10 text-slate-600 text-sm">進行中のドラフトはありません</div>
                        </div>
                    </div>

                    <!-- Editor -->
                    <div
                        class="lg:col-span-2 bg-slate-900/50 border border-slate-800 rounded-2xl p-8 backdrop-blur-sm relative">
                        <div id="editor-overlay"
                            class="absolute inset-0 bg-slate-950/80 z-10 flex items-center justify-center rounded-2xl">
                            <p class="text-slate-500">左のリストからプロジェクトを選択するか、<br>Ideationで新しいテーマを生成してください</p>
                        </div>

                        <div class="space-y-6">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <label
                                        class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">プロジェクト名</label>
                                    <input type="text" id="edit-title"
                                        class="w-full bg-transparent text-xl font-bold text-white border-b border-transparent focus:border-slate-600 outline-none transition"
                                        readonly>
                                </div>
                                <span
                                    class="px-2 py-1 bg-amber-500/10 text-amber-500 text-xs rounded border border-amber-500/20">下書き</span>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label
                                        class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">URL
                                        (任意)</label>
                                    <input type="text" id="edit-url" placeholder="https://..."
                                        class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-1 focus:ring-blue-500 outline-none">
                                </div>
                                <div>
                                    <label
                                        class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">メモ
                                        /
                                        こだわり</label>
                                    <input type="text" id="edit-memo" placeholder="開発メモやこだわり..."
                                        class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-1 focus:ring-blue-500 outline-none">
                                </div>
                            </div>

                            <div class="pt-4 border-t border-slate-700">
                                <div class="mb-4">
                                    <h4 class="font-bold text-slate-300 text-sm">提出データ (最終化)</h4>
                                </div>

                                <div class="grid grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label
                                            class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">仕様書
                                            (Protocol)</label>
                                        <textarea id="edit-protocol" rows="4"
                                            class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-300 focus:ring-1 focus:ring-blue-500 outline-none resize-none"
                                            placeholder="AIが生成した仕様書を貼り付け"></textarea>
                                    </div>
                                    <div>
                                        <label
                                            class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">対話ログ
                                            (Dialogue Log)</label>
                                        <textarea id="edit-dialogue" rows="4"
                                            class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-300 focus:ring-1 focus:ring-blue-500 outline-none resize-none"
                                            placeholder="AIとの対話ログを貼り付け"></textarea>
                                    </div>
                                </div>

                                <div>
                                    <label
                                        class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">一言キャッチコピー</label>
                                    <input type="text" id="edit-catchcopy" placeholder="この作品を一言で表すと？"
                                        class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-1 focus:ring-blue-500 outline-none">
                                </div>

                                <div class="flex gap-4 mt-8">
                                    <button onclick="saveDraft()"
                                        class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-xl transition border border-slate-700 flex justify-center items-center gap-2">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4">
                                            </path>
                                        </svg>
                                        下書き保存
                                    </button>
                                    <button onclick="sealProduct()"
                                        class="flex-[2] py-3 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-bold rounded-xl transition shadow-lg shadow-blue-900/50 flex justify-center items-center gap-2">
                                        <span>🎁</span> 封印する (提出 & アーカイブ)
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Tab 2: Gallery (Archive) -->
        <div id="view-gallery" class="hidden">
            <!-- ③【ナラティブ一覧セクション：Archive】 -->
            <section id="section-archive" class="relative">
                <div class="flex flex-wrap items-baseline gap-4 mb-6 border-b border-slate-800 pb-2">
                    <h2
                        class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-400">
                        みんなの広場 (Gallery)
                    </h2>
                    <p class="text-sm text-slate-400">初期衝動のアーカイブ。</p>

                    <!-- User Filter -->
                    <div class="ml-auto flex items-center gap-2">
                        <label for="filter-user" class="text-xs text-slate-400">Filter:</label>
                        <select id="filter-user" onchange="window.filterArchives()"
                            class="bg-slate-900 border border-slate-700 text-slate-300 text-xs rounded px-2 py-1 outline-none focus:border-emerald-500 transition hover:border-emerald-500/50">
                            <option value="all">All Users</option>
                        </select>
                    </div>
                </div>

                <div id="archive-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Archive Items will be loaded here -->
                    <div class="col-span-full text-center py-20 text-slate-600">アーカイブを読み込み中...</div>
                </div>
            </section>
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center py-12 border-t border-slate-800 bg-slate-950">
        <p class="text-slate-500 text-sm font-light">
            © 2026 Waku-Waku Lab.
        </p>
    </footer>

    <script type="module">
        import { checkAuth, logout as commonLogout } from '../js/common.js';

        let currentUserHash = null;
        let currentDraftId = null;
        let allProducts = [];

        // --- Init & Auth ---
        function init() {
            const auth = checkAuth(false);
            const statusElement = document.getElementById('loginStatus');

            if (auth) {
                currentUserHash = auth.userHash;
                statusElement.innerHTML = `
                    <span class="text-slate-300">User: <strong class="text-white font-mono">${auth.userHash.substring(0, 8)}...</strong></span>
                    <button onclick="window.handleLogout()" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 transition text-slate-300 text-xs font-medium">ログアウト</button>
                `;
                loadDrafts();
            } else {
                statusElement.innerHTML = `
                    <a href="/login.html#wakuwaku" class="px-3 py-1.5 rounded-lg bg-purple-500 hover:bg-purple-600 transition text-white text-xs font-medium">ログイン</a>
                `;
            }
            // Always load archives
            loadArchives();

            // Set default tab
            switchTab('personal');
        }

        window.handleLogout = () => commonLogout('/wakuwaku/index.html');

        // --- Tab Logic ---
        function switchTab(tab) {
            const btnPersonal = document.getElementById('btn-personal');
            const btnGallery = document.getElementById('btn-gallery');
            const viewPersonal = document.getElementById('view-personal');
            const viewGallery = document.getElementById('view-gallery');

            if (tab === 'personal') {
                btnPersonal.classList.add('bg-purple-600', 'text-white', 'shadow-md');
                btnPersonal.classList.remove('text-slate-400');
                btnGallery.classList.remove('bg-purple-600', 'text-white', 'shadow-md');
                btnGallery.classList.add('text-slate-400');
                btnGallery.classList.remove('bg-emerald-600', 'text-white', 'shadow-md'); // ensure reset

                viewPersonal.classList.remove('hidden');
                viewGallery.classList.add('hidden');
            } else {
                btnGallery.classList.add('bg-emerald-600', 'text-white', 'shadow-md');
                btnGallery.classList.remove('text-slate-400');
                btnPersonal.classList.remove('bg-purple-600', 'text-white', 'shadow-md');
                btnPersonal.classList.add('text-slate-400');

                viewGallery.classList.remove('hidden');
                viewPersonal.classList.add('hidden');
            }
        }
        window.switchTab = switchTab;

        // --- Ideation Logic ---
        window.generateSeed = async () => {
            const interest = document.getElementById('input-interest').value.trim();
            if (!interest) {
                alert('興味・関心を入力してください');
                return;
            }

            // 1. Get Random Constraint
            let constraint = { content: 'なし', category: 'Default' };
            try {
                const res = await fetch('/api/wakuwaku/constraints/random');
                if (res.ok) constraint = await res.json();
            } catch (e) { console.error(e); }

            document.getElementById('constraint-category').innerText = constraint.category || 'Constraint';
            document.getElementById('constraint-content').innerText = constraint.content;

            // 2. Get Base Prompt & Combine
            let basePromptTemplate = '';
            try {
                const res = await fetch('/api/wakuwaku/base-prompt');
                if (res.ok) {
                    const data = await res.json();
                    basePromptTemplate = data.prompt;
                }
            } catch (e) { console.error(e); }

            if (!basePromptTemplate || basePromptTemplate === 'プロンプトが設定されていません') {
                basePromptTemplate = `以下のテーマで、尖ったWebアプリケーションの仕様とプロトタイプコードを考えてください。
    
【テーマ】
{{THEME}}

【絶対的な制約】
{{CONSTRAINT}}

【出力要件】
1. アプリのキャッチコピー
2. 詳細な仕様（プロトコル）
3. 実装するためのHTML/JSコード（単一ファイルで動作するもの）
4. 開発者の「変執的なこだわり」ポイント
`;
            }

            const seedText = basePromptTemplate
                .replace(/{{THEME}}/g, interest)
                .replace(/{{CONSTRAINT}}/g, constraint.content);

            document.getElementById('output-seed').value = seedText;

            const btnArea = document.getElementById('action-create-project');
            btnArea.classList.remove('opacity-50', 'pointer-events-none');
        };

        window.copySeed = () => {
            const text = document.getElementById('output-seed').value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => alert('コピーしました！'));
        };

        // --- Development Logic ---
        window.createProjectFromSeed = async () => {
            if (!currentUserHash) { alert('ログインしてください'); return; }

            const interest = document.getElementById('input-interest').value.trim();
            const constraint = document.getElementById('constraint-content').innerText;
            if (!interest || constraint === '???') {
                alert('まずはIdeationでテーマを生成してください');
                return;
            }

            const title = `${interest} × ${constraint}`;

            try {
                const res = await fetch('/api/wakuwaku/drafts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, user_hash: currentUserHash })
                });
                const data = await res.json();
                if (data.success) {
                    await loadDrafts();
                    // Personal tab is already active
                    document.getElementById('section-development').scrollIntoView({ behavior: 'smooth' });
                    setTimeout(() => {
                        const firstDraft = document.querySelector('#draft-list > div');
                        if (firstDraft) firstDraft.click();
                    }, 500);
                } else {
                    alert('失敗しました: ' + data.message);
                }
            } catch (e) {
                console.error(e);
                alert('エラーが発生しました');
            }
        };

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function loadDrafts() {
            if (!currentUserHash) return;
            try {
                const res = await fetch(`/api/wakuwaku/drafts?user_hash=${currentUserHash}`);
                const drafts = await res.json();
                const container = document.getElementById('draft-list');

                if (drafts.length === 0) {
                    container.innerHTML = '<div class="text-center py-10 text-slate-600 text-sm">進行中のドラフトはありません</div>';
                    return;
                }

                container.innerHTML = drafts.map(d => {
                    // Safe JSON stringify for the onclick handler
                    const json = JSON.stringify(d).replace(/'/g, "&#39;").replace(/"/g, "&quot;");
                    return `
                    <div onclick='window.selectDraft(${json})' 
                         class="p-3 bg-slate-900 rounded-xl cursor-pointer hover:bg-slate-800 transition border border-transparent hover:border-slate-700 group flex items-center justify-between">
                        <div class="flex-1 min-w-0 pr-2">
                           <h4 class="font-bold text-slate-300 text-sm truncate group-hover:text-white">${escapeHtml(d.title)}</h4>
                           <p class="text-[10px] text-slate-500 mt-1">${new Date(d.created_at).toLocaleDateString()}</p>
                        </div>
                        <button onclick="event.stopPropagation(); window.confirmDeleteDraft(${d.id})" class="p-1.5 rounded-lg hover:bg-slate-700 text-slate-600 hover:text-red-400 transition" title="下書きを削除">
                           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `}).join('');
            } catch (e) { console.error(e); }
        }

        window.selectDraft = (draft) => {
            currentDraftId = draft.id;
            document.getElementById('editor-overlay').classList.add('hidden');
            document.getElementById('edit-title').value = draft.title;
            document.getElementById('edit-url').value = draft.url || '';
            document.getElementById('edit-memo').value = draft.dev_obsession || '';
            document.getElementById('edit-protocol').value = draft.protocol_log || '';
            document.getElementById('edit-dialogue').value = draft.dialogue_log || '';
            document.getElementById('edit-catchcopy').value = draft.catch_copy || '';
        };

        window.saveDraft = async () => {
            if (!currentDraftId) return;
            // Retrieve all necessary values
            const url = document.getElementById('edit-url').value;
            const memo = document.getElementById('edit-memo').value;
            const protocol_log = document.getElementById('edit-protocol').value;
            const dialogue_log = document.getElementById('edit-dialogue').value;
            const catch_copy = document.getElementById('edit-catchcopy').value;

            try {
                // Send all fields to backend
                const res = await fetch('/api/wakuwaku/drafts/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentDraftId,
                        user_hash: currentUserHash,
                        url,
                        dev_obsession: memo,
                        protocol_log,
                        dialogue_log,
                        catch_copy
                    })
                });
                if (res.ok) {
                    alert('保存しました！');
                    await loadDrafts();
                }
            } catch (e) { alert('保存に失敗しました'); }
        };

        window.sealProduct = async () => {
            if (!currentDraftId) return;
            if (!confirm('本当に封印（提出）しますか？これにより公開され、編集できなくなります。')) return;

            const protocol_log = document.getElementById('edit-protocol').value;
            const dialogue_log = document.getElementById('edit-dialogue').value;
            const catch_copy = document.getElementById('edit-catchcopy').value;

            if (!protocol_log || !dialogue_log) {
                alert('仕様書(Protocol)と対話ログ(Dialogue Log)は必須です');
                return;
            }

            try {
                const res = await fetch('/api/wakuwaku/seal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentDraftId,
                        user_hash: currentUserHash,
                        protocol_log,
                        dialogue_log,
                        catch_copy
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert('封印完了！');
                    currentDraftId = null;
                    document.getElementById('editor-overlay').classList.remove('hidden');
                    loadDrafts();
                    loadArchives();

                    // Switch to gallery to show result? No, stay here for now or user might want to see it.
                    // But requirement says archive is in Gallery tab.
                    if (confirm('封印しました。みんなの広場 (Gallery) で確認しますか？')) {
                        switchTab('gallery');
                    }
                } else {
                    alert('エラー: ' + data.message);
                }
            } catch (e) { alert('封印エラー'); }
        };

        // --- Archive Logic ---
        async function loadArchives() {
            try {
                const res = await fetch('/api/wakuwaku/products');
                allProducts = await res.json();

                // Populate Filter Dropdown
                const filterSelect = document.getElementById('filter-user');
                // Use a Set to get unique user hashes
                const users = [...new Set(allProducts.map(p => p.creator_user_hash).filter(u => u))];

                // Preserve current selection if possible, otherwise default to all
                const currentSelection = filterSelect.value || 'all';

                let optionsHtml = '<option value="all">All Users</option>';
                users.forEach(u => {
                    const shortHash = u.length > 8 ? u.substring(0, 8) + '...' : u;
                    const selected = u === currentSelection ? 'selected' : ''; // Wait, value is reset on innerHTML rewrite usually, checking below
                    optionsHtml += `<option value="${u}">${shortHash}</option>`;
                });
                filterSelect.innerHTML = optionsHtml;

                // Restore selection if it still exists in options, otherwise all
                if (users.includes(currentSelection) || currentSelection === 'all') {
                    filterSelect.value = currentSelection;
                }

                filterArchives();
            } catch (e) { console.error(e); }
        }

        window.filterArchives = () => {
            const filterSelect = document.getElementById('filter-user');
            // If filterSelect is null (e.g. before DOM load), return
            if (!filterSelect) return;

            const filterUser = filterSelect.value;
            let filtered = allProducts;
            if (filterUser !== 'all') {
                filtered = allProducts.filter(p => p.creator_user_hash === filterUser);
            }
            renderGrid(filtered);
        };

        function renderGrid(products) {
            const grid = document.getElementById('archive-grid');
            if (!grid) return;

            if (products.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-600">表示するアーカイブはありません</div>';
                return;
            }

            grid.innerHTML = products.map(p => {
                const creatorDisplay = p.creator_user_hash
                    ? (p.creator_user_hash.length > 8 ? p.creator_user_hash.substring(0, 8) + '...' : p.creator_user_hash)
                    : 'Unknown';

                return `
                <div class="bg-slate-900 border border-slate-700 rounded-xl p-6 hover:border-emerald-500/50 transition group flex flex-col justify-between h-full">
                    <div>
                        <h3 class="font-bold text-white text-lg mb-2 line-clamp-2" title="${escapeHtml(p.title)}">${escapeHtml(p.title)}</h3>
                        <div class="flex flex-wrap items-center gap-2 text-xs text-slate-500 mb-4">
                            <span class="bg-slate-800 px-2 py-0.5 rounded text-emerald-400 border border-emerald-500/20 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                ${escapeHtml(creatorDisplay)}
                            </span>
                            <span>${new Date(p.sealed_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 pt-4 border-t border-slate-800 mt-2">
                         <a href="detail.html?id=${p.id}" class="flex-1 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs rounded text-center transition border border-slate-700 flex items-center justify-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            提出データ(詳細)
                        </a>
                        ${(localStorage.getItem('role') === 'admin') ? `
                        <button onclick="window.unsealProduct(${p.id})" class="px-3 py-2 bg-red-900/20 hover:bg-red-900/40 text-red-500 text-xs rounded border border-red-500/30 flex items-center gap-1" title="下書きに戻す (管理者)">
                             <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
                             Unlock
                        </button>` : ''}
                        ${p.url ? `
                        <a href="${escapeHtml(p.url)}" target="_blank" class="px-3 py-2 bg-blue-900/20 hover:bg-blue-900/30 text-blue-400 text-xs rounded border border-blue-500/30 flex items-center gap-1" title="URLを開く">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            URL
                        </a>` : ''}
                    </div>
                </div>
            `}).join('');
        }

        window.selectDraft = selectDraft; // re-bind

        window.confirmDeleteDraft = async (id) => {
            if (!confirm('本当に削除しますか？この操作は取り消せません。')) return;
            try {
                const res = await fetch('/api/wakuwaku/delete-product', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, user_hash: currentUserHash })
                });
                const data = await res.json();
                if (data.success) {
                    alert('削除しました');
                    if (currentDraftId == id) {
                        currentDraftId = null;
                        document.getElementById('editor-overlay').classList.remove('hidden');
                        document.getElementById('edit-title').value = '';
                        document.getElementById('edit-url').value = '';
                        document.getElementById('edit-memo').value = '';
                        document.getElementById('edit-protocol').value = '';
                        document.getElementById('edit-dialogue').value = '';
                        document.getElementById('edit-catchcopy').value = '';
                    }
                    loadDrafts();
                } else {
                    alert('削除失敗: ' + data.message);
                }
            } catch (e) { alert('削除エラー'); }
        };

        window.unsealProduct = async (id) => {
            if (!confirm('このプロダクトを下書きに戻しますか？（管理者のみ）')) return;
            try {
                const res = await fetch('/api/wakuwaku/unseal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, user_hash: currentUserHash })
                });
                const data = await res.json();
                if (data.success) {
                    alert('下書きに戻しました');
                    loadArchives();
                } else {
                    alert('エラー: ' + data.message);
                }
            } catch (e) { alert('通信エラー'); }
        };

        init();
    </script>
</body>

</html>
