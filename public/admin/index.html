<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 - Matsutani Prototyping Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <!-- 管理者チェック完了まで非表示 -->
    <div id="adminContent" style="display: none;">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">管理画面</h1>
                    <p class="text-sm text-gray-500">Matsutani Prototyping Studio</p>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-600" id="adminName">Loading...</span>
                    <a href="../index.html" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 transition">
                        サイトに戻る
                    </a>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-8">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">総ユーザー数</h3>
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                            </path>
                        </svg>
                    </div>
                    <p class="text-3xl font-bold text-gray-900" id="userCount">-</p>
                </div>

                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">コマラボ投稿</h3>
                        <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                    </div>
                    <p class="text-3xl font-bold text-gray-900" id="issueCount">-</p>
                </div>

                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">ワクワク作品</h3>
                        <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                            </path>
                        </svg>
                    </div>
                    <p class="text-3xl font-bold text-gray-900" id="productCount">-</p>
                </div>

                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">総コメント数</h3>
                        <svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                            </path>
                        </svg>
                    </div>
                    <p class="text-3xl font-bold text-gray-900" id="commentCount">-</p>
                </div>
            </div>

            <!-- Management Sections -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Base Prompt Management -->
                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                            </path>
                        </svg>
                        ワクワク試作室 - ベースプロンプト
                    </h2>
                    <div class="flex gap-2 mb-4 justify-end">
                        <input type="file" id="importBasePromptsFile" accept=".json" class="hidden"
                            onchange="importBasePrompts(event)">
                        <button onclick="exportBasePrompts()"
                            class="text-xs px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded transition font-medium">エクスポート</button>
                        <button onclick="document.getElementById('importBasePromptsFile').click()"
                            class="text-xs px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded transition font-medium">インポート</button>
                    </div>

                    <div class="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <input type="hidden" id="bp-id">
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="bp-label" placeholder="ラベル (例: 社会派)"
                                class="w-1/2 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-purple-500 outline-none">
                            <button onclick="saveBasePrompt()"
                                class="flex-1 px-4 py-2 bg-purple-500 hover:bg-purple-600 text-white text-sm font-medium rounded-lg transition">
                                保存
                            </button>
                            <button onclick="resetBasePromptForm()"
                                class="px-3 py-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-600 text-sm font-medium rounded-lg transition">
                                クリア
                            </button>
                        </div>
                        <textarea id="bp-content" rows="4"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg text-xs focus:ring-2 focus:ring-purple-500 outline-none font-mono"
                            placeholder="プロンプト内容..."></textarea>
                    </div>

                    <div id="basePromptList" class="space-y-2 max-h-60 overflow-y-auto">
                        <p class="text-center text-xs text-gray-500 py-4">読み込み中...</p>
                    </div>
                </div>

                <!-- Requirement Prompt Management (Komarabo) -->
                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        困りごとラボ - 要件定義プロンプト
                    </h2>
                    <p class="text-xs text-gray-500 mb-3">課題投稿時にGeminiへ渡すシステムプロンプト。<span
                            class="text-blue-600 font-medium">使用中</span>バッジがついているものが現在利用中です。</p>

                    <!-- 新規追加フォーム -->
                    <div class="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <input type="hidden" id="kp-id">
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="kp-label" placeholder="ラベル (例: デフォルト)"
                                class="w-1/2 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <button id="kp-save-btn" onclick="saveKomaraboPrompt()"
                                class="flex-1 px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium rounded-lg transition">
                                保存
                            </button>
                            <button onclick="resetKomaraboForm()"
                                class="px-3 py-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-600 text-sm font-medium rounded-lg transition">
                                クリア
                            </button>
                        </div>
                        <textarea id="kp-content" rows="4"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg text-xs focus:ring-2 focus:ring-blue-500 outline-none font-mono"
                            placeholder="プロンプト内容..."></textarea>
                    </div>

                    <!-- プロンプト一覧 -->
                    <div id="komaraboPromptList" class="space-y-2 max-h-60 overflow-y-auto">
                        <p class="text-center text-xs text-gray-500 py-4">読み込み中...</p>
                    </div>
                </div>

                <!-- Constraint Slots Management -->
                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                            </path>
                        </svg>
                        制約スロット管理 (Ideation)
                    </h2>
                    <div class="flex gap-2 mb-4 justify-end">
                        <input type="file" id="importConstraintsFile" accept=".json" class="hidden"
                            onchange="importConstraints(event)">
                        <button onclick="exportConstraints()"
                            class="text-xs px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded transition font-medium">エクスポート</button>
                        <button onclick="document.getElementById('importConstraintsFile').click()"
                            class="text-xs px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded transition font-medium">インポート</button>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newConstraintContent" placeholder="New Constraint..."
                            class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <select id="newConstraintCategory" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="デザイン">デザイン</option>
                            <option value="ターゲット">ターゲット</option>
                            <option value="技術制約">技術制約</option>
                        </select>
                        <button onclick="addConstraint()"
                            class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-lg">追加</button>
                    </div>
                    <div id="constraintList" class="space-y-2 max-h-64 overflow-y-auto">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- User Management -->
                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                            </path>
                        </svg>
                        ユーザー管理
                    </h2>
                    <div class="mb-3 flex items-center gap-2 text-xs text-gray-500">
                        <span class="inline-block w-3 h-3 rounded-full bg-green-400"></span> 有効
                        <span class="inline-block w-3 h-3 rounded-full bg-red-400 ml-2"></span> 無効
                    </div>
                    <div id="userList" class="space-y-2 max-h-96 overflow-y-auto">
                        <p class="text-sm text-gray-500">読み込み中...</p>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="mt-6 bg-white rounded-xl p-6 border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    最近の投稿
                </h2>
                <div id="recentActivity" class="space-y-3">
                    <p class="text-sm text-gray-500">読み込み中...</p>
                </div>
            </div>
    </div>

    <!-- 認証チェック中の表示 -->
    <div id="authLoading" class="flex items-center justify-center min-h-screen">
        <p class="text-gray-400">認証確認中...</p>
    </div>

    <script type="module" src="../js/admin-index.js"></script>
</body>

</html>
