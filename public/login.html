<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Glassmorphism */
        .glass {
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300" id="body">

    <div id="card" class="w-full max-w-md p-8 rounded-2xl shadow-xl transition-all duration-300 transform">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 id="pageTitle" class="text-2xl font-bold mb-2 transition-colors duration-300">ログイン</h1>
            <p id="subTitle" class="text-sm transition-colors duration-300 opacity-70">アカウントにアクセスする</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="space-y-4">
            <div>
                <label for="loginUserHash"
                    class="block text-xs font-bold uppercase tracking-widest mb-1 opacity-60">Nick Name</label>
                <input type="text" id="loginUserHash" placeholder="ニックネーム"
                    class="w-full px-4 py-3 rounded-xl border focus:ring-2 outline-none transition duration-200">
            </div>
            <div>
                <label for="loginPassword"
                    class="block text-xs font-bold uppercase tracking-widest mb-1 opacity-60">Password</label>
                <input type="password" id="loginPassword" placeholder="パスワード"
                    class="w-full px-4 py-3 rounded-xl border focus:ring-2 outline-none transition duration-200">
            </div>
            <button onclick="login()" id="loginBtn"
                class="w-full py-3.5 rounded-xl font-bold text-white shadow-lg transition duration-200 transform hover:-translate-y-0.5 mt-2">
                ログイン
            </button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="space-y-4 hidden">
            <div>
                <label for="registerUserHash"
                    class="block text-xs font-bold uppercase tracking-widest mb-1 opacity-60">Nick Name</label>
                <input type="text" id="registerUserHash" placeholder="ニックネーム（公開されます）"
                    class="w-full px-4 py-3 rounded-xl border focus:ring-2 outline-none transition duration-200">
                <p class="text-[10px] mt-1 opacity-50">※他のユーザーにも表示される名前です</p>
            </div>
            <div>
                <label for="registerPassword"
                    class="block text-xs font-bold uppercase tracking-widest mb-1 opacity-60">Password</label>
                <input type="password" id="registerPassword" placeholder="パスワード"
                    class="w-full px-4 py-3 rounded-xl border focus:ring-2 outline-none transition duration-200">
            </div>
            <button onclick="register()" id="registerBtn"
                class="w-full py-3.5 rounded-xl font-bold text-white shadow-lg transition duration-200 transform hover:-translate-y-0.5 mt-2">
                新規登録
            </button>
        </div>

        <!-- Toggle -->
        <div class="mt-8 text-center text-sm">
            <span id="toggleText" class="opacity-70">アカウントをお持ちでない方は</span>
            <button id="toggleButton" onclick="toggleForm()"
                class="font-bold underline ml-1 hover:opacity-80 transition">
                新規登録
            </button>
        </div>

        <!-- Back Link -->
        <div class="mt-6 text-center">
            <a href="/index.html" class="text-xs opacity-50 hover:opacity-100 transition">トップページへ戻る</a>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        let theme = 'komarabo'; // 'komarabo' (light) or 'wakuwaku' (dark)
        let redirectTo = '/komarabo/index.html';

        // Elements
        const body = document.getElementById('body');
        const card = document.getElementById('card');
        const inputs = document.querySelectorAll('input');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const pageTitle = document.getElementById('pageTitle');
        const subTitle = document.getElementById('subTitle');
        const toggleButton = document.getElementById('toggleButton');

        // Theme Definitions
        const themes = {
            komarabo: {
                body: ['bg-cream', 'text-slate-800'],
                card: ['bg-white', 'border', 'border-slate-100', 'shadow-slate-200'],
                input: ['bg-white', 'border-slate-200', 'text-slate-800', 'focus:ring-blue-500', 'focus:border-blue-500', 'placeholder-slate-400'],
                btn: ['bg-blue-600', 'hover:bg-blue-700', 'shadow-blue-200'],
                text: ['text-blue-600'], // for toggle button
                title: '困りごとラボ',
                subtitle: '街の課題を解決するプラットフォーム',
                redirect: '/komarabo/index.html'
            },
            wakuwaku: {
                body: ['bg-slate-900', 'text-slate-100'],
                card: ['bg-slate-800', 'border', 'border-slate-700', 'shadow-slate-900'],
                input: ['bg-slate-900', 'border-slate-600', 'text-slate-100', 'focus:ring-purple-500', 'focus:border-purple-500', 'placeholder-slate-500'],
                btn: ['bg-purple-600', 'hover:bg-purple-700', 'shadow-purple-900/50'],
                text: ['text-purple-400'], // for toggle button
                title: 'ワクワク試作室',
                subtitle: '技術とアイデアの実験場',
                redirect: '/wakuwaku/index.html' // Note: wakuwaku usually redirects to post page in logic, but default base is here
            }
        };

        function getHash() {
            const hash = window.location.hash.substring(1);
            return hash || 'komarabo'; // Default to komarabo if empty
        }

        // Initialize Theme based on URL Hash
        function applyTheme() {
            const hash = getHash();

            if (hash === 'wakuwaku') {
                theme = 'wakuwaku';
                redirectTo = '/wakuwaku/index.html';
            } else {
                theme = 'komarabo';
                redirectTo = '/komarabo/index.html';
            }

            // URL Parameter Override (同一オリジンのパスのみ許可)
            const urlParams = new URLSearchParams(window.location.search);
            const redirectParam = urlParams.get('redirect_to');
            if (redirectParam) {
                const decoded = decodeURIComponent(redirectParam);
                // 同一オリジンの相対パスのみ許可（外部URLやプロトコル相対URLは拒否）
                if (decoded.startsWith('/') && !decoded.startsWith('//')) {
                    redirectTo = decoded;
                }
            }

            const t = themes[theme];

            // Reset classes
            body.className = "min-h-screen flex items-center justify-center p-4 transition-colors duration-300";
            card.className = "w-full max-w-md p-8 rounded-2xl shadow-xl transition-all duration-300 transform";

            // Apply new classes
            body.classList.add(...t.body);
            card.classList.add(...t.card);

            inputs.forEach(input => {
                input.className = "w-full px-4 py-3 rounded-xl border focus:ring-2 outline-none transition duration-200";
                input.classList.add(...t.input);
            });

            [loginBtn, registerBtn].forEach(btn => {

                // Remove previous specific color classes carefully or just resetbase
                // Simplified: Re-assign base and add specific
                btn.className = "w-full py-3.5 rounded-xl font-bold text-white shadow-lg transition duration-200 transform hover:-translate-y-0.5 mt-2";
                btn.classList.add(...t.btn);
            });

            toggleButton.className = "font-bold underline ml-1 hover:opacity-80 transition";
            toggleButton.classList.add(...t.text);

            // Text Content
            pageTitle.textContent = t.title;
            subTitle.textContent = t.subtitle;
        }

        function toggleForm() {
            isLoginMode = !isLoginMode;
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const toggleText = document.getElementById('toggleText');
            const toggleButton = document.getElementById('toggleButton');

            if (isLoginMode) {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                toggleText.textContent = 'アカウントをお持ちでない方は';
                toggleButton.textContent = '新規登録';
                loginBtn.textContent = 'ログイン'; // Ensure button text is correct
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                toggleText.textContent = 'すでにアカウントをお持ちの方は';
                toggleButton.textContent = 'ログイン';
                registerBtn.textContent = '新規登録';
            }
        }

        async function handleAuth(endpoint, payload) {
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('user_hash', data.user_hash);
                    localStorage.setItem('role', data.role || 'requester');
                    localStorage.setItem('is_admin', data.is_admin ? '1' : '0');
                    localStorage.setItem('auth_token', data.auth_token || 'dummy_token');

                    // Show simple feedback (using alert for now as per original, but could be toasted)
                    // alert(data.message); 

                    location.href = redirectTo;
                } else {
                    alert(data.message || '認証に失敗しました');
                }
            } catch (err) {
                console.error(err);
                alert('エラーが発生しました');
            }
        }

        function login() {
            const user_hash = document.getElementById('loginUserHash').value;
            const password = document.getElementById('loginPassword').value;
            handleAuth('/api/auth/login', { user_hash, password });
        }

        function register() {
            const user_hash = document.getElementById('registerUserHash').value;
            const password = document.getElementById('registerPassword').value;
            handleAuth('/api/auth/login', { user_hash, password }); // Assuming same endpoint handles registration if new user? 
            // Original code used same endpoint. Usually registration might be separate or flag based, 
            // but checking original implementation: logic seems to be "get or create" or handled by backend.
            // Keeping as is.
        }

        // Event Listeners for Hash Change (to support back button or manual URL change without reload)
        window.addEventListener('hashchange', applyTheme);

        // Initial Load
        applyTheme();
    </script>
</body>

</html>
