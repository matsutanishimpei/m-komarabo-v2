<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Glassmorphism */
        .glass {
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .google-btn {
            background: #fff;
            border: 2px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .google-btn:hover {
            border-color: #4285F4;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.2);
            transform: translateY(-1px);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        .error-banner {
            animation: fadeIn 0.3s ease forwards;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300" id="body">

    <div id="card" class="w-full max-w-md p-8 rounded-2xl shadow-xl transition-all duration-300 transform fade-in">
        <!-- Error Banner -->
        <div id="errorBanner"
            class="hidden mb-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm error-banner">
            <span id="errorMessage"></span>
        </div>

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 id="pageTitle" class="text-2xl font-bold mb-2 transition-colors duration-300">ログイン</h1>
            <p id="subTitle" class="text-sm transition-colors duration-300 opacity-70">Googleアカウントでログイン</p>
        </div>

        <!-- Google OAuth Login Button -->
        <div class="space-y-4">
            <button onclick="loginWithGoogle()" id="googleLoginBtn"
                class="google-btn w-full py-3.5 rounded-xl font-bold flex items-center justify-center gap-3 text-gray-700">
                <!-- Google Icon SVG -->
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    <path fill="none" d="M0 0h48v48H0z" />
                </svg>
                <span>Googleでログイン</span>
            </button>
        </div>

        <!-- Info -->
        <div class="mt-6 text-center">
            <p class="text-xs opacity-50">Googleアカウントで安全にログインできます</p>
            <p class="text-xs opacity-40 mt-1">初回ログイン時に自動でアカウントが作成されます</p>
        </div>

        <!-- Back Link -->
        <div class="mt-6 text-center">
            <a href="/index.html" class="text-xs opacity-50 hover:opacity-100 transition">トップページへ戻る</a>
        </div>
    </div>

    <script>
        let theme = 'komarabo';
        let redirectTo = '/komarabo/index.html';

        // Elements
        const body = document.getElementById('body');
        const card = document.getElementById('card');
        const pageTitle = document.getElementById('pageTitle');
        const subTitle = document.getElementById('subTitle');

        // Theme Definitions
        const themes = {
            komarabo: {
                body: ['bg-cream', 'text-slate-800'],
                card: ['bg-white', 'border', 'border-slate-100', 'shadow-slate-200'],
                title: '困りごとラボ',
                subtitle: 'Googleアカウントでログイン',
                redirect: '/komarabo/index.html'
            },
            wakuwaku: {
                body: ['bg-slate-900', 'text-slate-100'],
                card: ['bg-slate-800', 'border', 'border-slate-700', 'shadow-slate-900'],
                title: 'ワクワク試作室',
                subtitle: 'Googleアカウントでログイン',
                redirect: '/wakuwaku/index.html'
            }
        };

        function getHash() {
            const hash = window.location.hash.substring(1);
            return hash || 'komarabo';
        }

        // Initialize Theme based on URL Hash
        function applyTheme() {
            const hash = getHash();

            if (hash === 'wakuwaku') {
                theme = 'wakuwaku';
                redirectTo = '/wakuwaku/index.html';
            } else {
                theme = 'komarabo';
                redirectTo = '/komarabo/index.html';
            }

            // URL Parameter Override (同一オリジンのパスのみ許可)
            const urlParams = new URLSearchParams(window.location.search);
            const redirectParam = urlParams.get('redirect_to');
            if (redirectParam) {
                const decoded = decodeURIComponent(redirectParam);
                if (decoded.startsWith('/') && !decoded.startsWith('//')) {
                    redirectTo = decoded;
                }
            }

            const t = themes[theme];

            // Reset classes
            body.className = "min-h-screen flex items-center justify-center p-4 transition-colors duration-300";
            card.className = "w-full max-w-md p-8 rounded-2xl shadow-xl transition-all duration-300 transform fade-in";

            // Apply new classes
            body.classList.add(...t.body);
            card.classList.add(...t.card);

            // Text Content
            pageTitle.textContent = t.title;
            subTitle.textContent = t.subtitle;
        }

        // Google OAuth ログイン
        function loginWithGoogle() {
            const authUrl = `/api/auth/google?redirect_to=${encodeURIComponent(redirectTo)}`;
            window.location.href = authUrl;
        }

        // エラーメッセージ表示
        function showError(message) {
            const banner = document.getElementById('errorBanner');
            const msgEl = document.getElementById('errorMessage');
            msgEl.textContent = message;
            banner.classList.remove('hidden');
        }

        // URLパラメータでエラーチェック
        function checkForErrors() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                const errorMessages = {
                    'oauth_denied': 'Google認証がキャンセルされました',
                    'no_code': '認証コードの取得に失敗しました',
                    'token_exchange_failed': 'トークンの交換に失敗しました',
                    'userinfo_failed': 'ユーザー情報の取得に失敗しました',
                    'internal': 'サーバーエラーが発生しました。もう一度お試しください',
                };
                showError(errorMessages[error] || 'ログインに失敗しました');
            }
        }

        // 既にログイン済みの場合はリダイレクト
        async function checkExistingAuth() {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'same-origin' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated) {
                        location.href = redirectTo;
                    }
                }
            } catch (e) {
                // 無視
            }
        }

        // Event Listeners
        window.addEventListener('hashchange', applyTheme);

        // Initial Load
        applyTheme();
        checkForErrors();
        checkExistingAuth();
    </script>
</body>

</html>
