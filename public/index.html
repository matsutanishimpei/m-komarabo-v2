<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試作室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }

        .door-card {
            transition: all 0.3s ease;
        }

        .door-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-5xl w-full">
        <!-- Header -->
        <div class="text-center mb-20">
            <h1 class="text-5xl md:text-6xl font-light text-slate-900 mb-4 tracking-tight">
                試作室
            </h1>
            <p class="text-lg text-slate-500 font-light">
                さて、今日はどっちの扉を叩く？
            </p>
        </div>

        <!-- Two Doors -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
            <!-- Left Door: Komarabo -->
            <a href="/komarabo/index.html" class="door-card group block">
                <div
                    class="relative overflow-hidden border border-slate-200 rounded-2xl p-10 h-full min-h-[400px] flex flex-col justify-between hover:border-blue-300 hover:shadow-xl hover:shadow-blue-100 transition-all bg-white group-hover:-translate-y-1">

                    <!-- Background Gradient (Subtle City Feel) -->
                    <!-- Background Image & Gradient -->
                    <!-- Background Image & Gradient -->
                    <!-- Background Image & Gradient -->
                    <div class="absolute inset-0 z-0">
                        <img src="images/komarabo_card.png" alt=""
                            class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-b from-white/90 via-white/60 to-white/90"></div>
                    </div>

                    <div class="relative z-10">
                        <!-- Icon -->
                        <div class="mb-8">
                            <h2 class="text-3xl font-semibold text-slate-900 mb-2">
                                困りごとラボ
                            </h2>
                            <p class="text-sm text-slate-400 font-light tracking-wide">
                                Komarabo
                            </p>
                        </div>

                        <!-- Catchphrase -->
                        <div class="mb-8">
                            <p class="text-xl text-slate-700 leading-relaxed font-light">
                                その悩み、<br>
                                プロトタイプの種になる。
                            </p>
                        </div>

                        <!-- Description -->
                        <div class="space-y-2 mb-8">
                            <p class="text-sm text-slate-500 leading-relaxed">
                                市民や非ITの方の「不便」を投稿し、解決策を議論する場所。
                            </p>
                        </div>
                    </div>

                    <!-- CTA -->
                    <div
                        class="relative z-10 flex items-center text-blue-600 text-sm font-bold group-hover:translate-x-2 transition-transform">
                        課題を見る
                        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg>
                    </div>
                </div>
            </a>

            <!-- Right Door: Waku-Waku Lab -->
            <a href="/wakuwaku/index.html" class="door-card group block">
                <div
                    class="relative overflow-hidden border border-slate-200 rounded-2xl p-10 h-full min-h-[400px] flex flex-col justify-between hover:border-purple-300 hover:shadow-xl hover:shadow-purple-100 transition-all bg-slate-900 group-hover:-translate-y-1">

                    <!-- Background Image & Gradient -->
                    <div class="absolute inset-0 z-0">
                        <img src="images/wakuwaku_card.png" alt=""
                            class="w-full h-full object-cover opacity-50 group-hover:scale-105 transition-transform duration-700 mix-blend-overlay">
                        <div
                            class="absolute inset-0 bg-gradient-to-b from-slate-900/70 via-slate-900/40 to-slate-900/80">
                        </div>
                    </div>

                    <div class="relative z-10">
                        <div class="mb-8">
                            <h2 class="text-3xl font-semibold text-white mb-2">
                                ワクワク試作室
                            </h2>
                            <p class="text-sm text-slate-400 font-light tracking-wide">
                                Waku-Waku Lab
                            </p>
                        </div>

                        <!-- Catchphrase -->
                        <div class="mb-8">
                            <p class="text-xl text-slate-200 leading-relaxed font-light">
                                技術の無駄遣い、<br>
                                大歓迎。
                            </p>
                        </div>

                        <!-- Description -->
                        <div class="space-y-2 mb-8">
                            <p class="text-sm text-slate-400 leading-relaxed">
                                尖ったアプリや、エンジニアの変執的なこだわりが詰まったプロダクトの展示。
                            </p>
                        </div>
                    </div>

                    <!-- CTA -->
                    <div
                        class="relative z-10 flex items-center text-purple-400 text-sm font-bold group-hover:translate-x-2 transition-transform">
                        作品を見る
                        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg>
                    </div>
                </div>
            </a>
        </div>

        <!-- Footer -->
        <div class="text-center mt-20">
            <p class="text-slate-400 text-sm font-light">
                © 2026 Matsutani's Prototyping Studio
            </p>
            <a href="/admin/index.html"
                class="text-[10px] text-slate-300 mt-2 inline-block hover:text-slate-400 transition-colors">🔒 管理画面</a>
        </div>
    </div>
</body>

</html>
