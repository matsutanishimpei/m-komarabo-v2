<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 - Matsutani Prototyping Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <!-- 管理者チェック完了まで非表示 -->
    <div id="adminContent" style="display: none;">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">管理画面</h1>
                    <p class="text-sm text-gray-500">Matsutani Prototyping Studio</p>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-600" id="adminName">Loading...</span>
                    <a href="../index.html" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 transition">
                        サイトに戻る
                    </a>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-8">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">総ユーザー数</h3>
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                            </path>
                        </svg>
                    </div>
                    <p class="text-3xl font-bold text-gray-900" id="userCount">-</p>
                </div>

                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">コマラボ投稿</h3>
                        <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                    </div>
                    <p class="text-3xl font-bold text-gray-900" id="issueCount">-</p>
                </div>

                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">ワクワク作品</h3>
                        <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                            </path>
                        </svg>
                    </div>
                    <p class="text-3xl font-bold text-gray-900" id="productCount">-</p>
                </div>

                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium text-gray-600">総コメント数</h3>
                        <svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                            </path>
                        </svg>
                    </div>
                    <p class="text-3xl font-bold text-gray-900" id="commentCount">-</p>
                </div>
            </div>

            <!-- Management Sections -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Base Prompt Management -->
                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                            </path>
                        </svg>
                        ワクワク試作室 - ベースプロンプト
                    </h2>
                    <textarea id="basePrompt" rows="8"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none mb-4"
                        placeholder="読み込み中..."></textarea>
                    <button onclick="updateBasePrompt()"
                        class="w-full px-4 py-2 bg-purple-500 hover:bg-purple-600 text-white font-medium rounded-lg transition">
                        プロンプトを更新
                    </button>
                </div>

                <!-- Constraint Slots Management -->
                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                            </path>
                        </svg>
                        制約スロット管理 (Ideation)
                    </h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newConstraintContent" placeholder="New Constraint..."
                            class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <select id="newConstraintCategory" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="Constraint">Constraint</option>
                            <option value="Theme">Theme</option>
                            <option value="Tech">Tech</option>
                        </select>
                        <button onclick="addConstraint()"
                            class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-lg">追加</button>
                    </div>
                    <div id="constraintList" class="space-y-2 max-h-64 overflow-y-auto">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- User Management -->
                <div class="bg-white rounded-xl p-6 border border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                            </path>
                        </svg>
                        ユーザー管理
                    </h2>
                    <div class="mb-3 flex items-center gap-2 text-xs text-gray-500">
                        <span class="inline-block w-3 h-3 rounded-full bg-green-400"></span> 有効
                        <span class="inline-block w-3 h-3 rounded-full bg-red-400 ml-2"></span> 無効
                    </div>
                    <div id="userList" class="space-y-2 max-h-96 overflow-y-auto">
                        <p class="text-sm text-gray-500">読み込み中...</p>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="mt-6 bg-white rounded-xl p-6 border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    最近の投稿
                </h2>
                <div id="recentActivity" class="space-y-3">
                    <p class="text-sm text-gray-500">読み込み中...</p>
                </div>
            </div>
    </div>

    <!-- 認証チェック中の表示 -->
    <div id="authLoading" class="flex items-center justify-center min-h-screen">
        <p class="text-gray-400">認証確認中...</p>
    </div>

    <script type="module">
        import { checkAuth, adminApiRequest, apiRequest, formatDate, validateRequired, escapeHtml } from '../js/common.js';

        // 認証チェック
        const auth = checkAuth(true);
        const currentUserHash = auth.userHash;

        // 管理者チェック
        async function checkAdminAccess() {
            try {
                const data = await apiRequest('/api/admin/check', {
                    method: 'POST',
                    body: JSON.stringify({ user_hash: currentUserHash })
                });

                if (!data.is_admin) {
                    location.href = '../index.html';
                    return false;
                }

                // 管理者確認OK → ページ表示
                document.getElementById('authLoading').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                document.getElementById('adminName').textContent = `管理者: ${currentUserHash}`;
                return true;
            } catch (err) {
                console.error(err);
                location.href = '../index.html';
                return false;
            }
        }

        // 統計情報を取得
        async function loadStats() {
            try {
                const data = await adminApiRequest('/api/admin/stats');

                if (data) {
                    document.getElementById('userCount').textContent = data.users || 0;
                    document.getElementById('issueCount').textContent = data.issues || 0;
                    document.getElementById('productCount').textContent = data.products || 0;
                    document.getElementById('commentCount').textContent = data.comments || 0;
                }
            } catch (err) {
                console.error('統計情報の取得に失敗:', err);
            }
        }

        // ベースプロンプトを取得
        async function loadBasePrompt() {
            try {
                const data = await apiRequest('/api/wakuwaku/base-prompt');
                if (data) {
                    document.getElementById('basePrompt').value = data.prompt;
                }
            } catch (err) {
                console.error('ベースプロンプトの取得に失敗:', err);
            }
        }

        // ベースプロンプトを更新
        async function updateBasePrompt() {
            const prompt = document.getElementById('basePrompt').value.trim();

            if (!validateRequired(prompt, 'プロンプト')) {
                return;
            }

            try {
                const data = await adminApiRequest('/api/admin/update-base-prompt', { prompt });

                if (data.success) {
                    alert('プロンプトを更新しました！');
                } else {
                    alert('エラー: ' + (data.message || 'サーバーエラー'));
                }
            } catch (err) {
                console.error('更新エラー:', err);
                alert('更新に失敗しました');
            }
        }
        window.updateBasePrompt = updateBasePrompt;

        // ユーザー一覧を取得
        async function loadUsers() {
            try {
                const data = await adminApiRequest('/api/admin/users');

                if (data.users) {
                    const userList = document.getElementById('userList');
                    userList.innerHTML = data.users.map(user => {
                        const isSelf = user.user_hash === currentUserHash;
                        const isActive = user.is_active !== 0;
                        const rowOpacity = isActive ? '' : 'opacity-50';
                        const nameStyle = isActive ? '' : 'line-through';
                        const statusDot = isActive
                            ? '<span class="w-2.5 h-2.5 rounded-full bg-green-400 flex-shrink-0"></span>'
                            : '<span class="w-2.5 h-2.5 rounded-full bg-red-400 flex-shrink-0"></span>';

                        const adminBtnClass = user.is_admin
                            ? 'bg-red-100 text-red-600 hover:bg-red-200'
                            : 'bg-gray-100 text-gray-500 hover:bg-blue-100 hover:text-blue-600';
                        const adminBtnText = user.is_admin ? '管理者 ✓' : '一般';
                        const adminBtnDisabled = isSelf ? 'disabled class="px-2 py-1 text-xs font-medium rounded bg-red-100 text-red-600 cursor-not-allowed opacity-60"' : `onclick="toggleAdmin('${escapeHtml(user.user_hash)}')" class="px-2 py-1 text-xs font-medium rounded cursor-pointer transition ${adminBtnClass}"`;

                        const activeBtnClass = isActive
                            ? 'bg-green-100 text-green-700 hover:bg-red-100 hover:text-red-600'
                            : 'bg-red-100 text-red-600 hover:bg-green-100 hover:text-green-700';
                        const activeBtnText = isActive ? '有効' : '無効';
                        const activeBtnDisabled = isSelf ? 'disabled class="px-2 py-1 text-xs font-medium rounded bg-green-100 text-green-700 cursor-not-allowed opacity-60"' : `onclick="toggleActive('${escapeHtml(user.user_hash)}')" class="px-2 py-1 text-xs font-medium rounded cursor-pointer transition ${activeBtnClass}"`;

                        return `
                            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg ${rowOpacity}">
                                <div class="flex items-center gap-3">
                                    ${statusDot}
                                    <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-semibold text-sm">
                                        ${escapeHtml(user.user_hash.substring(0, 2).toUpperCase())}
                                    </div>
                                    <div>
                                        <p class="font-medium text-gray-900 ${nameStyle}">${escapeHtml(user.user_hash)}${isSelf ? ' <span class="text-xs text-blue-500">(自分)</span>' : ''}</p>
                                        <p class="text-xs text-gray-500">登録: ${formatDate(user.created_at)}</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button ${adminBtnDisabled}>${adminBtnText}</button>
                                    <button ${activeBtnDisabled}>${activeBtnText}</button>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (err) {
                console.error('ユーザー一覧の取得に失敗:', err);
            }
        }

        // 管理者権限の切り替え
        async function toggleAdmin(targetUserHash) {
            const action = confirm('このユーザーの管理者権限を切り替えますか？');
            if (!action) return;

            try {
                const data = await adminApiRequest('/api/admin/users/toggle-admin', {
                    target_user_hash: targetUserHash
                });
                if (data.success) {
                    alert(data.message);
                    loadUsers();
                } else {
                    alert('エラー: ' + (data.message || 'サーバーエラー'));
                }
            } catch (err) {
                console.error('管理者権限変更エラー:', err);
                alert('権限の変更に失敗しました');
            }
        }
        window.toggleAdmin = toggleAdmin;

        // ユーザー有効/無効の切り替え
        async function toggleActive(targetUserHash) {
            const action = confirm('このユーザーの有効/無効を切り替えますか？\n無効化されたユーザーはログインできなくなります。');
            if (!action) return;

            try {
                const data = await adminApiRequest('/api/admin/users/toggle-active', {
                    target_user_hash: targetUserHash
                });
                if (data.success) {
                    alert(data.message);
                    loadUsers();
                } else {
                    alert('エラー: ' + (data.message || 'サーバーエラー'));
                }
            } catch (err) {
                console.error('ステータス変更エラー:', err);
                alert('ステータスの変更に失敗しました');
            }
        }
        window.toggleActive = toggleActive;

        // 最近の投稿を取得
        async function loadRecentActivity() {
            try {
                const data = await adminApiRequest('/api/admin/recent-activity');

                if (data.activities) {
                    const activityList = document.getElementById('recentActivity');
                    activityList.innerHTML = data.activities.map(activity => `
                        <div class="flex items-start gap-3 p-3 bg-gray-50 rounded-lg">
                            <div class="w-2 h-2 rounded-full bg-green-500 mt-2"></div>
                            <div class="flex-1">
                                <p class="text-sm text-gray-900">${escapeHtml(activity.title)}</p>
                                <p class="text-xs text-gray-500">${escapeHtml(activity.type)} by ${escapeHtml(activity.user_hash)} - ${formatDate(activity.created_at)}</p>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error('最近の投稿の取得に失敗:', err);
            }
        }

        // 制約一覧を取得
        async function loadConstraints() {
            try {
                const data = await adminApiRequest('/api/admin/constraints/list');
                const list = document.getElementById('constraintList');
                if (Array.isArray(data)) {
                    list.innerHTML = data.map(c => `
                        <div class="flex items-center justify-between p-2 bg-gray-50 rounded border border-gray-100">
                            <span class="text-xs font-bold text-gray-500 w-20">${escapeHtml(c.category)}</span>
                            <span class="text-sm text-gray-800 flex-1 truncate px-2">${escapeHtml(c.content)}</span>
                            <button onclick="deleteConstraint(${c.id})" class="text-gray-400 hover:text-red-500 font-bold">×</button>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('Failed to load constraints:', e);
            }
        }
        window.loadConstraints = loadConstraints; // Ensure global access if needed

        // 制約を追加
        async function addConstraint() {
            const content = document.getElementById('newConstraintContent').value.trim();
            const category = document.getElementById('newConstraintCategory').value;
            if (!content) return;

            try {
                // adminApiRequest adds user_hash automatically
                const res = await adminApiRequest('/api/admin/constraints', {
                    category, content
                });
                if (res.success) {
                    document.getElementById('newConstraintContent').value = '';
                    loadConstraints();
                }
            } catch (e) {
                console.error(e);
                alert('追加失敗: ' + e.message);
            }
        }
        window.addConstraint = addConstraint;

        // 制約を削除
        async function deleteConstraint(id) {
            if (!confirm('削除しますか？')) return;
            try {
                const res = await adminApiRequest('/api/admin/constraints/delete', {
                    id
                });
                if (res.success) loadConstraints();
            } catch (e) {
                console.error(e);
                alert('削除失敗: ' + e.message);
            }
        }
        window.deleteConstraint = deleteConstraint;

        // 初期化
        async function init() {
            const isAdmin = await checkAdminAccess();
            if (!isAdmin) return;
            loadStats();
            loadBasePrompt();
            loadUsers();
            loadRecentActivity();
            loadConstraints();
        }

        init();
    </script>
</body>

</html>
